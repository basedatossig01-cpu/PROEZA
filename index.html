<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>Mapa de campo - PROEZA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

  <style>
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100%; width: 100%; }


    .btn-panel {
      display: none;
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1100;
      background: white;
      border: none;
      border-radius: 8px;
      padding: 9px 12px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      cursor: pointer;
    }

    .logo-proeza {
      position: absolute; top: 12px; right: 12px; z-index: 1000;
      width: 92px; background: white; padding: 6px; border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    }

    .panel {
      position: absolute; top: 12px; left: 12px; z-index: 1000;
      background: white; padding: 14px; border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.35);
      width: 350px; max-width: calc(100% - 30px); font-size: 13px;
    }

    .panel h3 { margin: 0 0 8px 0; font-size: 19px; color: #111; }

    .resumen-linea { font-weight: bold; line-height: 1.28; }
    .resumen-viviendas { color: #333; }
    .resumen-plantacion { color: #f57c00; }
    .resumen-poligonos { color: #e11b22; }
    .resumen-ubicacion { color: #6a1b9a; }
    .resumen-cocinas { color: #00897b; }

    .buscador {
      width: 100%; box-sizing: border-box; padding: 10px;
      margin-top: 12px; border: 1px solid #aaa; border-radius: 7px;
      font-size: 14px;
    }

    .botones { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }

    .boton {
      border: none; border-radius: 7px; padding: 8px 10px;
      font-weight: bold; cursor: pointer; color: #111; font-size: 13px;
    }

    .btn-viviendas { background: #fdd835; }
    .btn-parcelas { background: #fb8c00; color: white; }
    .btn-kml { background: #e11b22; color: white; }
    .btn-kmlp { background: #6a1b9a; color: white; }
    .btn-cocinas { background: #00897b; color: white; }

    .boton:not(.boton-activo) {
      background: #eeeeee !important;
      color: #333 !important;
    }

    .resultados {
      max-height: 180px; overflow-y: auto; margin-top: 8px;
      border-top: 1px solid #ddd; display: none; background: #fff;
    }

    .item-resultado {
      padding: 8px 4px; border-bottom: 1px solid #eee;
      cursor: pointer; line-height: 1.35;
    }

    .item-resultado:hover { background: #f1f1f1; }

    .resultado-titulo {
      font-weight: bold;
      margin-bottom: 3px;
    }

    .resultado-subtitulo {
      font-size: 12px;
      color: #444;
      margin-bottom: 6px;
    }

    .acciones-resultado {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .btn-resultado {
      border: none;
      border-radius: 6px;
      padding: 6px 8px;
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
    }

    .btn-res-vivienda { background: #fdd835; color: #111; }
    .btn-res-plantacion { background: #fb8c00; color: white; }
    .btn-res-mantenimiento { background: #e11b22; color: white; }
    .btn-res-cocina { background: #00897b; color: white; }


    .popup-card {
      min-width: 270px; max-width: 340px; color: #111;
      font-size: 14px; line-height: 1.55;
    }

    .popup-card h3 {
      margin: 6px 0 10px 0;
      font-size: 18px; color: #111; line-height: 1.2;
      text-transform: uppercase; border-bottom: 1px solid #ddd;
      padding-bottom: 8px;
    }

    .popup-badge {
      display: inline-block; padding: 4px 10px; border-radius: 14px;
      font-weight: bold; margin-bottom: 4px; font-size: 13px;
    }

    .badge-vivienda { background: #fdd835; color: #111; }
    .badge-parcela { background: #fb8c00; color: white; }
    .badge-poligono { background: #e11b22; color: white; }
    .badge-kmlp { background: #6a1b9a; color: white; }
    .badge-cocina { background: #00897b; color: white; }

    .popup-grid div { margin-bottom: 3px; }

    .distancia-box {
      margin-top: 8px;
      padding: 8px;
      background: #f1f8ff;
      border-left: 4px solid #1a73e8;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.35;
    }

    .btn-ruta, .btn-offline {
      display: inline-block;
      color: #ffffff !important;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none !important;
      font-weight: bold;
      margin-top: 12px;
      margin-right: 6px;
      text-align: center;
      font-size: 14px;
    }

    .btn-ruta { background: #1a73e8 !important; }
    .btn-offline { background: #2e7d32 !important; }

    .btn-ruta:visited, .btn-ruta:hover, .btn-ruta:active,
    .btn-offline:visited, .btn-offline:hover, .btn-offline:active {
      color: #ffffff !important; text-decoration: none !important;
    }

    .leaflet-popup-content-wrapper {
      background: white !important; color: #111 !important;
      border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.35);
    }

    .leaflet-popup-content { margin: 14px; }

    .label-nombre {
      background: rgba(255,255,255,0.92); border: 1px solid #555;
      border-radius: 4px; padding: 2px 4px; font-size: 11px;
      font-weight: bold; color: #111; white-space: nowrap;
    }

    .kml-label {
      background: transparent; border: none; color: white;
      font-size: 13px; font-weight: bold;
      text-shadow: -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000, 1px 1px 2px #000;
      text-align: center;
    }

    .mi-ubicacion-btn {
      position: absolute;
      right: 10px;
      bottom: 18px;
      z-index: 1000;
      background: white;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .parcelas-establecidas-btn {
      position: absolute;
      right: 10px;
      bottom: 58px;
      z-index: 1000;
      background: white;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      color: #1b5e20;
      white-space: nowrap;
    }

    .parcelas-establecidas-btn.activo {
      background: #ffeb3b;
      color: #111;
    }


    .norte-btn {
      position: absolute;
      right: 10px;
      bottom: 98px;
      z-index: 1000;
      background: white;
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      font-weight: bold;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .logo-proeza { width: 70px; }
      .btn-panel { display: block; }
      .panel {
        top: 55px;
        left: 12px;
        width: 300px;
        max-height: 70vh;
        overflow-y: auto;
        font-size: 12px;
        display: none;
      }
      .panel.panel-visible { display: block; }
      .panel h3 { font-size: 17px; }
      .mi-ubicacion-btn {
        right: 8px;
        bottom: 18px;
        padding: 7px 9px;
        font-size: 11px;
      }
      .parcelas-establecidas-btn {
        right: 8px;
        bottom: 54px;
        padding: 7px 9px;
        font-size: 11px;
      }
      .norte-btn {
        right: 8px;
        bottom: 90px;
        padding: 7px 9px;
        font-size: 11px;
      }
      .popup-card { min-width: 230px; max-width: 280px; }
    }
  </style>
</head>

<body>

<div id="map"></div>
<img src="Logo PROEZA (1).png" class="logo-proeza" alt="Logo PROEZA">

<button id="btnPanel" class="btn-panel" onclick="togglePanel()">☰ Capas / Info</button>

<div class="panel">
  <h3>Mapa de campo 🗺️</h3>
  <div><b>CSV:</b> <span id="nombreCSV">Sin CSV</span></div>
  <div><b>KML Polígono:</b> <span id="nombreKML">Sin KML</span></div>
  <div><b>KML Ubicación:</b> <span id="nombreKMLP">Sin KML ubicación</span></div>
  <div><b>Cocinas:</b> <span id="nombreCocinas">Sin cocinas</span></div>

  <div id="resumen">Cargando datos...</div>

  <input id="buscador" class="buscador" type="text" placeholder="Buscar por nombre, cédula o localidad">

  <div class="botones">
    <button id="btnViviendas" class="boton btn-viviendas boton-activo">🏠 Viviendas</button>
    <button id="btnParcelas" class="boton btn-parcelas boton-activo">○ Plantación</button>
    <button id="btnKML" class="boton btn-kml boton-activo">□ Polígono Mant.</button>
    <button id="btnKMLP" class="boton btn-kmlp boton-activo">📍 Ubicación Mant.</button>
    <button id="btnCocinas" class="boton btn-cocinas boton-activo">🔥 Cocinas</button>
  </div>

  <div style="margin-top:10px; line-height:1.5;">
    🟡 Vivienda<br>
    🟠 Plantación<br>
    □ Polígono Mantenimiento<br>
    📍 Ubicación Mantenimiento<br>
    🔥 Cocina eficiente<br>
    🔵 Mi ubicación
  </div>

  <div id="resultados" class="resultados"></div>
</div>

<button class="mi-ubicacion-btn" onclick="centrarMiUbicacion()">📍 Ubicación</button>
<button class="norte-btn" onclick="resetNorte()">🧭 Norte</button>
<button id="btnParcelasEstablecidas" class="parcelas-establecidas-btn" onclick="toggleParcelasEstablecidas()">🌿 Establecidas</button>

<script>
  const params = new URLSearchParams(window.location.search);

  const archivoCSV = params.get("csv") || "";
  const archivoKML = params.get("kml") || "";
  const archivoKMLP = params.get("kmlp") || "";
  const archivoCocinas = params.get("cocinas") || "";
  let archivoParcelasEstablecidas = params.get("parcelas") || "";

  const ZOOM_ETIQUETA_KML = 16;

  document.getElementById("nombreCSV").textContent = archivoCSV || "Sin CSV";
  document.getElementById("nombreKML").textContent = archivoKML || "Sin KML";
  document.getElementById("nombreKMLP").textContent = archivoKMLP || "Sin KML ubicación";
  document.getElementById("nombreCocinas").textContent = archivoCocinas || "Sin cocinas";

  const MAX_ZOOM_ESRI = 17;

  const map = L.map('map', {
    rotate: true,
    touchRotate: true,
    rotateControl: false,
    bearing: 0,
    maxZoom: MAX_ZOOM_ESRI,
    preferCanvas: true
  }).setView([-24.4, -56.4], 12);

  // Ajuste de velocidad de rotación:
  // Hace que el giro con dos dedos sea más controlado y menos brusco,
  // manteniendo la fluidez. Subir el factor = gira más rápido; bajar = más lento.
  const FACTOR_ROTACION = 0.52;
  const ROTACION_MINIMA_GRADOS = 0.35;

  if (map.setBearing) {
    map._setBearingOriginal = map.setBearing.bind(map);
    let bearingSuavizado = 0;

    function normalizarBearing(valor) {
      return ((valor % 360) + 360) % 360;
    }

    function diferenciaAngularFirmada(destino, origen) {
      return (((destino - origen) % 360) + 540) % 360 - 180;
    }

    map.setBearing = function(bearing, options) {
      const destino = normalizarBearing(bearing || 0);

      // Usado por el botón Norte para volver inmediatamente.
      if (options && options.forzarNorte) {
        bearingSuavizado = destino;
        return map._setBearingOriginal(destino, options);
      }

      const delta = diferenciaAngularFirmada(destino, bearingSuavizado);

      // Evita microgiros accidentales, pero deja rotar suavemente cuando el gesto es claro.
      if (Math.abs(delta) < ROTACION_MINIMA_GRADOS) {
        return this;
      }

      bearingSuavizado = normalizarBearing(bearingSuavizado + delta * FACTOR_ROTACION);
      return map._setBearingOriginal(bearingSuavizado, options);
    };
  }

  L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: MAX_ZOOM_ESRI, maxNativeZoom: MAX_ZOOM_ESRI, attribution: 'Tiles &copy; Esri' }
  ).addTo(map);

  L.tileLayer(
    'https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
    { maxZoom: MAX_ZOOM_ESRI, maxNativeZoom: MAX_ZOOM_ESRI, attribution: '' }
  ).addTo(map);

  const capaViviendas = L.featureGroup().addTo(map);
  const capaParcelas = L.featureGroup().addTo(map);
  const capaKML = L.featureGroup().addTo(map);
  const capaKMLP = L.featureGroup().addTo(map);
  const capaCocinas = L.featureGroup().addTo(map);
  const capaParcelasEstablecidas = L.featureGroup();
  const todosLosPuntos = L.featureGroup().addTo(map);

  let registrosBusqueda = [];
  let parcelasEstablecidasCargadas = false;
  let parcelasEstablecidasActivas = false;
  let ubicacionActual = null;
  let marcadorUsuario = null;

  let totalViviendasGlobal = 0;
  let totalParcelasGlobal = 0;
  let totalPoligonos = 0;
  let totalUbicacionMant = 0;
  let totalCocinas = 0;
  let totalParcelasEstablecidas = 0;

  const iconoVivienda = L.divIcon({
    html: `<div style="width:30px;height:30px;border-radius:50%;background:#fdd835;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 1px 5px rgba(0,0,0,0.55);">🏠</div>`,
    className: "", iconSize: [30, 30], iconAnchor: [15, 15]
  });

  const iconoParcela = L.divIcon({
    html: `<div style="width:32px;height:32px;border-radius:50%;background:#f4511e;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:18px;box-shadow:0 1px 5px rgba(0,0,0,0.55);">P</div>`,
    className: "", iconSize: [32, 32], iconAnchor: [16, 16]
  });

  const iconoKMLP = L.divIcon({
    html: `<div style="
      width:34px;height:34px;border-radius:50% 50% 50% 0;
      background:#e11b22;border:2px solid white;
      transform:rotate(-45deg);
      box-shadow:0 1px 5px rgba(0,0,0,0.55);
      display:flex;align-items:center;justify-content:center;">
      <div style="
        width:13px;height:13px;border-radius:50%;
        background:white;"></div>
    </div>`,
    className: "",
    iconSize: [34, 34],
    iconAnchor: [17, 34],
    popupAnchor: [0, -30]
  });

  const iconoCocina = L.divIcon({
    html: `<div style="width:32px;height:32px;border-radius:50%;background:#00897b;border:2px solid white;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;box-shadow:0 1px 5px rgba(0,0,0,0.55);">🔥</div>`,
    className: "", iconSize: [32, 32], iconAnchor: [16, 16]
  });

  function limpiarValor(valor) {
    if (valor === undefined || valor === null || String(valor).trim() === "") return "-";
    return String(valor).trim();
  }

  function normalizarTexto(valor) {
    return limpiarValor(valor)
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function get(row, nombre) {
    if (row[nombre] !== undefined) return row[nombre];

    const buscado = nombre.trim().toLowerCase();
    const clave = Object.keys(row).find(k => k.trim().toLowerCase() === buscado);
    return clave ? row[clave] : "";
  }

  function getCampoFlexible(row, posibles, contieneTexto) {
    for (const campo of posibles) {
      const valor = limpiarValor(get(row, campo));
      if (valor !== "-") return valor;
    }

    if (contieneTexto) {
      const clave = Object.keys(row).find(k => k.trim().toLowerCase().includes(contieneTexto.toLowerCase()));
      if (clave) {
        const valor = limpiarValor(row[clave]);
        if (valor !== "-") return valor;
      }
    }

    return "-";
  }

  function getModelo(row) {
    return getCampoFlexible(row, ["Modelo", "MODELO", "modelo", "Tipo de modelo", "Modelo SAF"], "modelo");
  }

  function convertirNumero(valor) {
    if (valor === undefined || valor === null || valor === "") return null;
    let texto = String(valor).trim().replace(",", ".");
    const num = parseFloat(texto);
    if (isNaN(num)) return null;
    return num;
  }

  function calcularDistanciaKm(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;

    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function crearBloqueDistancia(lat, lon) {
    if (!ubicacionActual || lat === null || lon === null) {
      return `
        <div class="distancia-box">
          📍 <b>Distancia:</b> esperando ubicación actual
        </div>
      `;
    }

    const distanciaKm = calcularDistanciaKm(
      ubicacionActual.lat,
      ubicacionActual.lng,
      lat,
      lon
    );

    return `
      <div class="distancia-box">
        📏 <b>Distancia aproximada:</b> ${distanciaKm.toFixed(2)} km
      </div>
    `;
  }

  function crearBotonRuta(lat, lon) {
    if (lat === null || lon === null) return "";

    const urlRutaOnline = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;

    // Este enlace usa el esquema nativo del teléfono.
    // En Android puede abrir Google Maps u otra app de mapas con la ubicación,
    // y tiene más posibilidades de funcionar si el mapa offline ya está descargado.
    const urlRutaOffline = `geo:${lat},${lon}?q=${lat},${lon}`;

    return `
      <div>
        <a class="btn-ruta" target="_blank" href="${urlRutaOnline}">🧭 Cómo llegar</a>
        <a class="btn-offline" href="${urlRutaOffline}">📍 Maps Offline</a>
      </div>
    `;
  }

  function crearPopupPrincipal(row, tipo, lat, lon) {
    const nombre = limpiarValor(get(row, "Nombres y Apellidos"));
    const cedula = limpiarValor(get(row, "Cédula"));
    const comunidad = limpiarValor(get(row, "Comunidad"));
    const modelo = getModelo(row);
    const departamento = limpiarValor(get(row, "Departamento"));
    const distrito = limpiarValor(get(row, "Distrito"));
    const localidad = limpiarValor(get(row, "Localidad"));
    const telefono = limpiarValor(get(row, "Teléfono"));
    const empresa = limpiarValor(get(row, "Empresa"));
    const lote = limpiarValor(get(row, "Lote"));
    const estadoParticipante = limpiarValor(get(row, "Estado del participante"));
    const estadoMonitoreo = limpiarValor(get(row, "Estado monitoreo"));
    const prioridad = limpiarValor(get(row, "Prioridad"));
    const superficie = limpiarValor(get(row, "Superficie (Ha.)"));
    const etapaFAO = limpiarValor(get(row, "Etapa de implementación FAO"));

    const badge = tipo === "Vivienda" ? "badge-vivienda" : "badge-parcela";

    return `
      <div class="popup-card">
        <span class="popup-badge ${badge}">${tipo}</span>
        <h3>${nombre}</h3>
        <div class="popup-grid">
          <div><b>Cédula:</b> ${cedula}</div>
          <div><b>Comunidad:</b> ${comunidad}</div>
          <div><b>Departamento:</b> ${departamento}</div>
          <div><b>Distrito:</b> ${distrito}</div>
          <div><b>Localidad:</b> ${localidad}</div>
          <div><b>Teléfono:</b> ${telefono}</div>
          <div><b>Modelo:</b> ${modelo}</div>
          <div><b>Superficie:</b> ${superficie}</div>
          <div><b>Empresa:</b> ${empresa}</div>
          <div><b>Lote:</b> ${lote}</div>
          <div><b>Estado participante:</b> ${estadoParticipante}</div>
          <div><b>Estado monitoreo:</b> ${estadoMonitoreo}</div>
          <div><b>Etapa de implementación FAO:</b> ${etapaFAO}</div>
          <div><b>Prioridad:</b> ${prioridad}</div>
        </div>
        ${crearBloqueDistancia(lat, lon)}
        ${crearBotonRuta(lat, lon)}
      </div>
    `;
  }

  function normalizarClave(texto) {
    return String(texto || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[̀-ͯ]/g, "")
      .replace(/[^a-z0-9]/g, "");
  }

  function getPropFlexible(props, posibles, contieneTexto) {
    const claves = Object.keys(props || {});

    for (const campo of posibles) {
      const normalCampo = normalizarClave(campo);
      const clave = claves.find(k => normalizarClave(k) === normalCampo);

      if (clave && String(props[clave]).trim() !== "") {
        return String(props[clave]).trim();
      }
    }

    if (contieneTexto) {
      const normalBusca = normalizarClave(contieneTexto);
      const clave = claves.find(k => normalizarClave(k).includes(normalBusca));

      if (clave && String(props[clave]).trim() !== "") {
        return String(props[clave]).trim();
      }
    }

    return "-";
  }


  function obtenerNombreLoteParaKML(valorLote) {
    const limpio = limpiarValor(valorLote);
    if (limpio === "-") return "";

    let lote = limpio.replace(/\.kml$/i, "").trim();
    lote = lote.replace(/\s+/g, "_");

    if (/^Lote_/i.test(lote)) return `${lote}.kml`;
    if (/^Lote\s+/i.test(limpio)) return `${limpio.replace(/\s+/g, "_")}.kml`;
    return `Lote_${lote}.kml`;
  }

  function obtenerLatLngCentroLayer(layer) {
    if (layer.getLatLng) return layer.getLatLng();
    if (layer.getBounds) return layer.getBounds().getCenter();
    return null;
  }

  function getNombrePoligono(layer) {

      .on('ready', function() {
        kmlLayer.eachLayer(function(layer) {

          if (layer.setStyle) {
            layer.setStyle({
              color: "#e11b22",

              fillOpacity: 0,
              fillColor: "transparent",
              opacity: 1
            });

          layer.bindTooltip(nombrePoligono, {
            permanent: false,
            direction: "center",
            className: "kml-label"
          });

          layer.bindPopup(() => crearPopupMantenimiento(layer, "Polígono Mantenimiento", archivoKML, null));

          capaKML.addLayer(layer);
          todosLosPuntos.addLayer(layer);

        actualizarResumen();
        ajustarVistaGeneral();
        actualizarEtiquetasKML();

        alert("No se pudo leer el KML de polígono. Verificá que exista en GitHub.");
        console.error(e);
      });
  }

  function getLatLngLayer(layer) {
    if (layer.getLatLng) return layer.getLatLng();
    if (layer.getBounds) return layer.getBounds().getCenter();
    return null;

  function cargarParcelasEstablecidas() {
    if (!archivoParcelasEstablecidas || parcelasEstablecidasCargadas) return;

    const kmlLayer = omnivore.kml(archivoParcelasEstablecidas)

              opacity: 1,
              dashArray: null
            });

          const latlng = obtenerLatLngCentroLayer(layer);
          const props = layer.feature && layer.feature.properties ? layer.feature.properties : {};
          const nombre = getPropFlexible(props, ["Nombres_y_", "Nombres_y", "Nombres y Apellidos", "NOMBRES_Y_", "Nombre", "name"], "nombres");
          const cedula = getPropFlexible(props, ["Cédula", "Cedula", "CEDULA", "CI", "C.I.", "C_I", "Nro_CI", "Nro CI", "nro_ci", "Cedula_Unificada", "Cédula_Unificada"], "ced");
          const comunidad = getPropFlexible(props, ["Comunidad", "COMUNIDAD"], "comunidad");
          const localidad = getPropFlexible(props, ["Localidad", "LOCALIDAD"], "localidad");

          layer.bindTooltip(nombre, {

            direction: "center",

          layer.bindPopup(() => crearPopupParcelaEstablecida(layer, archivoParcelasEstablecidas, latlng));

          if (latlng) {
            agregarBusqueda(nombre, cedula, comunidad, localidad, "Parcela Establecida", latlng.lat, latlng.lng, layer);
          }

          capaParcelasEstablecidas.addLayer(layer);
          todosLosPuntos.addLayer(layer);
        });

        parcelasEstablecidasCargadas = true;

        if (parcelasEstablecidasActivas && !map.hasLayer(capaParcelasEstablecidas)) {
          map.addLayer(capaParcelasEstablecidas);
        }
      })
      .on('error', function(e) {
        alert("No se pudo leer el KML de Parcelas Establecidas. Verificá que exista en GitHub: " + archivoParcelasEstablecidas);
        console.error(e);
        parcelasEstablecidasActivas = false;
        document.getElementById("btnParcelasEstablecidas").classList.remove("activo");
      });

  function toggleParcelasEstablecidas() {
    const btn = document.getElementById("btnParcelasEstablecidas");

    parcelasEstablecidasActivas = !parcelasEstablecidasActivas;

    if (parcelasEstablecidasActivas) {
      btn.classList.add("activo");

      if (!parcelasEstablecidasCargadas) {
        cargarParcelasEstablecidas();
      } else {
        map.addLayer(capaParcelasEstablecidas);
      }
    } else {
      btn.classList.remove("activo");
      if (map.hasLayer(capaParcelasEstablecidas)) {
        map.removeLayer(capaParcelasEstablecidas);
      }
    }

    actualizarBusquedaActual();

    });

    capaKML.eachLayer(function(layer) {

    if (tipo === "Vivienda") return "🏠 Vivienda";
    if (tipo === "Plantación") return "🌳 Plantación";
    if (tipo === "Parcela Mantenimiento" || tipo === "Ubicación Mantenimiento") return "📍 Parcela Mantenimiento";
    if (tipo === "Cocina eficiente") return "🔥 Cocina eficiente";
    if (tipo === "Parcela Establecida") return "🌿 Parcela Establecida";
    return tipo;
  }

  function claseBotonResultado(tipo) {
    if (tipo === "Vivienda") return "btn-res-vivienda";
    if (tipo === "Plantación") return "btn-res-plantacion";
    if (tipo === "Parcela Mantenimiento" || tipo === "Ubicación Mantenimiento") return "btn-res-mantenimiento";
    if (tipo === "Cocina eficiente") return "btn-res-cocina";
    if (tipo === "Parcela Establecida") return "btn-res-mantenimiento";
    return "btn-res-vivienda";
  }

  function abrirResultadoBusqueda(registro) {
    map.setView([registro.lat, registro.lon], 17);
    registro.marker.openPopup();
    document.getElementById("resultados").style.display = "none";
  }

  function claveParticipanteBusqueda(registro) {
    if (registro.cedula && registro.cedula !== "-") {
      return `CI_${registro.cedula}`;
    }
    return `NOMBRE_${registro.nombre}_${registro.localidad}_${registro.comunidad}`;
  }

  function actualizarBusquedaActual() {
    const input = document.getElementById("buscador");
    const valor = input.value.trim().toLowerCase();
    const contenedor = document.getElementById("resultados");
    contenedor.innerHTML = "";

    if (valor.length < 2) {
      contenedor.style.display = "none";
      return;
    }

    const encontrados = registrosBusqueda.filter(r => {
      if (r.tipo === "Parcela Establecida" && !parcelasEstablecidasActivas) return false;
      return r.texto.includes(valor);
    });

    const grupos = new Map();

    encontrados.forEach(r => {
      const clave = claveParticipanteBusqueda(r);

      if (!grupos.has(clave)) {
        grupos.set(clave, {
          nombre: r.nombre,
          cedula: r.cedula,
          localidad: r.localidad,
          comunidad: r.comunidad,
          opciones: []
        });
      }

      const grupo = grupos.get(clave);
      const yaExisteTipo = grupo.opciones.some(op => op.tipo === r.tipo);

      if (!yaExisteTipo) {
        grupo.opciones.push(r);
      }
    });

    Array.from(grupos.values()).slice(0, 12).forEach(grupo => {
      const div = document.createElement("div");
      div.className = "item-resultado";

      const subtitulo = `CI: ${grupo.cedula || "-"} | Localidad: ${grupo.localidad || "-"}`;

      div.innerHTML = `
        <div class="resultado-titulo">${grupo.nombre}</div>
        <div class="resultado-subtitulo">${subtitulo}</div>
        <div class="acciones-resultado"></div>
      `;

      const acciones = div.querySelector(".acciones-resultado");

      const orden = {
        "Vivienda": 1,
        "Plantación": 2,
        "Parcela Mantenimiento": 3,
        "Ubicación Mantenimiento": 3,
        "Cocina eficiente": 4,
        "Parcela Establecida": 5
      };

      grupo.opciones
        .sort((a, b) => (orden[a.tipo] || 99) - (orden[b.tipo] || 99))
        .forEach(opcion => {
          const btn = document.createElement("button");
          btn.className = `btn-resultado ${claseBotonResultado(opcion.tipo)}`;
          btn.textContent = etiquetaTipoBusqueda(opcion.tipo);
          btn.onclick = function(e) {
            e.stopPropagation();
            abrirResultadoBusqueda(opcion);
          };
          acciones.appendChild(btn);
        });

      contenedor.appendChild(div);
    });

    contenedor.style.display = grupos.size > 0 ? "block" : "none";
  }

  document.getElementById("buscador").addEventListener("input", actualizarBusquedaActual);

  map.locate({ setView: false, watch: true, enableHighAccuracy: true });

  map.on('locationfound', function(e) {
    ubicacionActual = e.latlng;

    if (marcadorUsuario) {
      marcadorUsuario.setLatLng(e.latlng);
    } else {
      marcadorUsuario = L.circleMarker(e.latlng, {
        radius: 8,
        color: "#1a73e8",
        fillColor: "#1a73e8",
        fillOpacity: 0.9,
        weight: 3
      }).addTo(map).bindPopup("Mi ubicación actual");
    }
  });

  function togglePanel() {
    document.querySelector(".panel").classList.toggle("panel-visible");
  }

  function resetNorte() {
    if (map._setBearingOriginal) {
      map.setBearing(0, { forzarNorte: true });
    } else if (map.setBearing) {
      map.setBearing(0);
    } else if (map.touchRotate && map.touchRotate.setBearing) {
      map.touchRotate.setBearing(0);
    } else {
      alert("La rotación no está disponible en este navegador.");
    }
  }

  function centrarMiUbicacion() {
    if (ubicacionActual) {
      map.setView(ubicacionActual, 17);
      if (marcadorUsuario) marcadorUsuario.openPopup();
    } else {
      alert("Todavía no se pudo obtener tu ubicación. Permití el acceso a ubicación en el navegador.");
    }
  }
</script>

</html>
